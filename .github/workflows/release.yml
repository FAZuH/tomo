# Credit: Workflow configs based on https://github.com/Wynntils/Wynntils

name: Release & Deploy

on:
  push:
    branches:
      - release

permissions:
  contents: write
  packages: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.changelog.outputs.tag }}
      skipped: ${{ steps.changelog.outputs.skipped }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up version.json
        run: echo "{\"version\":\"$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')\"}" > version.json

      - name: Install changelog dependencies
        run: npm install conventional-changelog-conventionalcommits@7.0.2

      - name: Generate Changelog (dry run)
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6
        with:
          skip-commit: true
          skip-tag: true
          github-token: ${{ secrets.PRIVATE_TOKEN }}
          config-file-path: ./.github/.config.js
          version-file: ./version.json
          preset: conventionalcommits
          skip-version-file: true
          skip-git-pull: true
          skip-on-empty: false

      - name: Bump Cargo.toml version
        if: ${{ steps.changelog.outputs.skipped != 'true' }}
        run: |
          VERSION=${{ steps.changelog.outputs.tag }}
          VERSION=${VERSION#v}
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/}" Cargo.toml

      - name: Upload patched Cargo.toml
        if: ${{ steps.changelog.outputs.skipped != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: patched-cargo-toml
          path: Cargo.toml

  build:
    name: Build Binary (${{ matrix.target }})
    needs: changelog
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: tomo
            asset_name: tomo-linux-x64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: tomo.exe
            asset_name: tomo-windows-x64.exe
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: tomo
            asset_name: tomo-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: tomo
            asset_name: tomo-macos-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download patched Cargo.toml
        uses: actions/download-artifact@v4
        with:
          name: patched-cargo-toml
          path: .

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y --fix-missing libfontconfig1-dev libsqlite3-dev libasound2-dev

      - name: Install SQLite (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          vcpkg install sqlite3:x64-windows-static
          echo "SQLITE3_LIB_DIR=C:/vcpkg/installed/x64-windows-static/lib" >> $env:GITHUB_ENV
          echo "VCPKGRS_DYNAMIC=0" >> $env:GITHUB_ENV

      - name: Build Package
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} artifacts/${{ matrix.asset_name }}
          chmod +x artifacts/${{ matrix.asset_name }}

      - name: Prepare Artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir artifacts
          copy target\${{ matrix.target }}\release\${{ matrix.binary }} artifacts\${{ matrix.asset_name }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: artifacts/${{ matrix.asset_name }}

  publish-changelog:
    name: Publish Changelog Commit
    needs: [changelog, build]
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    outputs:
      tag: ${{ steps.commit.outputs.tag }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up version.json
        run: echo "{\"version\":\"$(git describe --tags --abbrev=0 2>/dev/null || echo '0.0.0')\"}" > version.json

      - name: Download patched Cargo.toml
        uses: actions/download-artifact@v4
        with:
          name: patched-cargo-toml
          path: .

      - name: Install changelog dependencies
        run: npm install conventional-changelog-conventionalcommits@7.0.2

      - name: Commit, Tag, Push
        id: commit
        uses: TriPSs/conventional-changelog-action@v6
        with:
          github-token: ${{ secrets.PRIVATE_TOKEN }}
          git-user-name: "faz-bot"
          git-user-email: "mail@fazuh.com"
          config-file-path: ./.github/.config.js
          version-file: ./version.json
          preset: conventionalcommits
          skip-version-file: true
          skip-git-pull: true
          skip-on-empty: false

  release-github:
    name: Release to GitHub
    needs: [changelog, build, publish-changelog]
    if: ${{ needs.changelog.outputs.skipped != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tomo-*

      - name: Prepare Release Files
        run: |
          mkdir -p release
          cp artifacts/tomo-linux-x64/tomo-linux-x64 release/
          cp artifacts/tomo-windows-x64.exe/tomo-windows-x64.exe release/
          cp artifacts/tomo-macos-x64/tomo-macos-x64 release/
          cp artifacts/tomo-macos-arm64/tomo-macos-arm64 release/

      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.publish-changelog.outputs.tag }}
          body: ${{ needs.changelog.outputs.changelog }}
          files: release/*

      - name: Post Release on Discord
        uses: tsickert/discord-webhook@v6.0.0
        with:
          webhook-url: ${{ secrets.DISCORD_RELEASE_WEBHOOK_URL }}
          embed-color: "9498256"
          embed-title: "tomo ${{ needs.publish-changelog.outputs.tag }}"
          embed-description: ${{ needs.changelog.outputs.changelog }}
          embed-url: ${{ steps.release.outputs.url }}
          embed-timestamp: ${{ github.event.head_commit.timestamp }}
