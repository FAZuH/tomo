name: Rust Format & Test

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    branches: [main, development]

env:
  CARGO_TERM_COLOR: always

jobs:
  patch-version:
    name: Patch Version
    if: "! github.event.pull_request.draft"
    uses: ./.github/workflows/patch-version.yml

  build:
    name: Build
    needs: patch-version
    if: "! github.event.pull_request.draft"
    uses: ./.github/workflows/build.yml
    with:
      upload-binary: true

  format-and-test:
    name: Run Rust Tests
    if: "! github.event.pull_request.draft"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Nightly Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Set up Stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci"

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y pkg-config libfontconfig1-dev libsqlite3-dev libasound2-dev

      - name: Check Format
        run: cargo +nightly fmt --all -- --check

      - name: Lint with Clippy
        run: cargo clippy --all-features --all-targets --no-deps -- -D warnings

      - name: Run Tests
        run: cargo test --all-features --no-fail-fast
